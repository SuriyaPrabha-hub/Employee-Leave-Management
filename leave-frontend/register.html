<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LeaveHub | Register</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="bg"></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">

<div class="left">

<h1>Join LeaveHub</h1>

<p>

Create your employee account to apply leave, view leave history and manage your profile.

</p>

<ul>

<li><i class="fa-solid fa-circle-check"></i> Easy Registration</li>

<li><i class="fa-solid fa-circle-check"></i> Secure Login</li>

<li><i class="fa-solid fa-circle-check"></i> Leave Tracking</li>

<li><i class="fa-solid fa-circle-check"></i> HR Management</li>

</ul>

</div>

<div class="right">

<div class="card">

<h2>Create Account</h2>

<p>Register as Employee</p>

<div class="input-box">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="name"
placeholder="Full Name">

</div>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email">

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password">

</div>

<div class="input-box">

<i class="fa-solid fa-building"></i>

<input
type="text"
id="department"
placeholder="Department">

</div>

<button onclick="registerEmployee()">

Register

</button>

<div class="bottom">

Already have an account?

<a href="index.html">

Login

</a>

</div>

</div>

</div>

</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/register.js"></script>

</body>

</html>
