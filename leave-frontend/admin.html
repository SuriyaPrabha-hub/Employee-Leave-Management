<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body class="dashboard-body">

<div class="sidebar">

<h2>LeaveHub</h2>

<a href="admin.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="employees.html"><i class="fa fa-users"></i> Employees</a>

<a href="requests.html"><i class="fa fa-calendar-check"></i> Leave Requests</a>

<a href="reports.html"><i class="fa fa-chart-pie"></i> Reports</a>

<a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>

<a href="index.html"><i class="fa fa-right-from-bracket"></i> Logout</a>

</div>

<div class="main-content">

<div class="topbar">

<h1>Admin Dashboard 👨‍💼</h1>

</div>

<div class="cards">

<div class="card-box blue">

<h3>Total Employees</h3>

<h1 id="employees">0</h1>

</div>

<div class="card-box orange">

<h3>Total Leaves</h3>

<h1 id="leaves">0</h1>

</div>

<div class="card-box green">

<h3>Approved</h3>

<h1 id="approved">0</h1>

</div>

<div class="card-box red">

<h3>Rejected</h3>

<h1 id="rejected">0</h1>

</div>

</div>

<div class="cards">

<div class="card-box purple">

<h3>Pending Leaves</h3>

<h1 id="pending">0</h1>

</div>

</div>

<div class="quick-actions">

<h2>Quick Actions</h2>

<div class="action-buttons">

<a href="employees.html">View Employees</a>

<a href="requests.html">Leave Requests</a>

<a href="reports.html">Reports</a>
</div>

</div>

</div>

<script src="js/admin.js"></script>

</body>

</html>
