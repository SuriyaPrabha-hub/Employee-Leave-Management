<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body class="dashboard-body">

<div class="sidebar">

<h2>LeaveHub</h2>

<a href="employee.html"><i class="fa-solid fa-house"></i> Dashboard</a>

<a href="applyleave.html"><i class="fa-solid fa-calendar-plus"></i> Apply Leave</a>

<a href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> Leave History</a>

<a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>

<a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

</div>

<div class="main-content">

<div class="topbar">

<h1>Welcome 👋</h1>

<div class="profile">

<i class="fa-solid fa-user-circle"></i>

<span id="employeeName">Employee</span>

</div>

</div>

<div class="cards">

<div class="card-box blue">

<h2>Total Leaves</h2>

<h1 id="totalLeave">12</h1>

</div>

<div class="card-box orange">

<h2>Pending</h2>

<h1 id="pending">2</h1>

</div>

<div class="card-box green">

<h2>Approved</h2>

<h1 id="approved">8</h1>

</div>

<div class="card-box red">

<h2>Rejected</h2>

<h1 id="rejected">2</h1>

</div>

</div>

<div class="quick-actions">

<h2>Quick Actions</h2>

<div class="action-buttons">

<a href="applyleave.html">Apply Leave</a>

<a href="history.html">Leave History</a>

</div>

</div>

<div class="recent">

<h2>Recent Leave Requests</h2>

<table>

<thead>

<tr>

<th>Type</th>

<th>From</th>

<th>To</th>

<th>Status</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td>Sick Leave</td>

<td>20-07-2026</td>

<td>22-07-2026</td>

<td><span class="status approved">Approved</span></td>

</tr>

</tbody>

</table>

</div>

</div>

<script src="js/employee.js"></script>

</body>

</html>
