<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reports</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="dashboard-body">

<div class="sidebar">

<h2>LeaveHub</h2>

<a href="admin.html"><i class="fa fa-chart-line"></i> Dashboard</a>

<a href="employees.html"><i class="fa fa-users"></i> Employees</a>

<a href="requests.html"><i class="fa fa-calendar-check"></i> Leave Requests</a>

<a href="reports.html"><i class="fa fa-chart-pie"></i> Reports</a>
<a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>

<a href="index.html"><i class="fa fa-right-from-bracket"></i> Logout</a>

</div>

<div class="main-content">

<div class="topbar">

<h1>Reports & Analytics 📊</h1>

</div>

<div class="cards">

<div class="card-box blue">

<h3>Total Leaves</h3>

<h1 id="totalLeaves">0</h1>

</div>

<div class="card-box green">

<h3>Approved</h3>

<h1 id="approved">0</h1>

</div>

<div class="card-box orange">

<h3>Pending</h3>

<h1 id="pending">0</h1>

</div>

<div class="card-box red">

<h3>Rejected</h3>

<h1 id="rejected">0</h1>

</div>

</div>

<div class="chart-container">

<canvas id="leaveChart"></canvas>

</div>

</div>

<script src="js/reports.js"></script>

</body>

</html>
