<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>LeaveHub | Employee Leave Management</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="bg"></div>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="container">

<div class="left">

<h1>LeaveHub</h1>

<p>

Manage employee leave requests effortlessly with a modern HR platform.

</p>

<ul>

<li><i class="fa-solid fa-circle-check"></i> Employee Login</li>

<li><i class="fa-solid fa-circle-check"></i> Leave Requests</li>

<li><i class="fa-solid fa-circle-check"></i> Admin Dashboard</li>

<li><i class="fa-solid fa-circle-check"></i> Approval Workflow</li>

</ul>

</div>

<div class="right">

<div class="card">

<h2>Welcome Back 👋</h2>

<p>Login to your account</p>

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address">

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password">

</div>

<button onclick="login()">

Login

</button>

<div class="bottom">

Don't have an account?

<a href="register.html">

Register

</a>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/login.js"></script>

</body>
</html>
