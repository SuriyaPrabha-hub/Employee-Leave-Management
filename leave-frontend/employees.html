<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Employees</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="dashboard-body">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>LeaveHub</h2>

        <a href="admin.html"><i class="fa fa-chart-line"></i> Dashboard</a>

        <a href="employees.html"><i class="fa fa-users"></i> Employees</a>

        <a href="requests.html"><i class="fa fa-calendar-check"></i> Leave Requests</a>

        <a href="reports.html"><i class="fa fa-chart-pie"></i> Reports</a>

        <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>

        <a href="index.html"><i class="fa fa-right-from-bracket"></i> Logout</a>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="topbar">

            <h1>Employees</h1>

        </div>

        <!-- Heading + Export Button -->

        <div class="table-header">

            <h2>Employee List</h2>

            <button class="export-btn" onclick="exportExcel()">

                <i class="fa-solid fa-file-excel"></i>

                Export Excel

            </button>

        </div>

        <!-- Search -->

        <input type="text"
               id="search"
               class="search-box"
               placeholder="Search Employee..."
               onkeyup="searchEmployee()">

        <!-- Employee Table -->

        <table id="employeeTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Department</th>

                    <th>Role</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="employeeBody">

            </tbody>

        </table>

    </div>

    <!-- SweetAlert -->

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Excel Library -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- JS -->

    <script src="js/employees.js"></script>

</body>

</html>
